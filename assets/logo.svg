<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="12" fill="url(#bgGrad)"/>
  <rect width="480" height="160" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Circuit grid lines (subtle) -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
  </g>

  <!-- Icon: Brain/Circuit nodes (left) -->
  <g transform="translate(28, 80)" filter="url(#softglow)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="16" fill="url(#accentGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#0f0f1a"/>
    <circle cx="0" cy="0" r="5" fill="url(#accentGrad)"/>

    <!-- Orbiting nodes -->
    <circle cx="-28" cy="-18" r="6" fill="#6366f1" opacity="0.8"/>
    <circle cx="28" cy="-18" r="6" fill="#06b6d4" opacity="0.8"/>
    <circle cx="-28" cy="18" r="6" fill="#06b6d4" opacity="0.8"/>
    <circle cx="28" cy="18" r="6" fill="#6366f1" opacity="0.8"/>
    <circle cx="0" cy="-32" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="0" cy="32" r="4" fill="#22d3ee" opacity="0.7"/>

    <!-- Connections -->
    <g stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.6" fill="none">
      <line x1="0" y1="-5" x2="-24" y2="-16"/>
      <line x1="0" y1="-5" x2="24" y2="-16"/>
      <line x1="0" y1="5" x2="-24" y2="16"/>
      <line x1="0" y1="5" x2="24" y2="16"/>
      <line x1="0" y1="-16" x2="0" y2="-28"/>
      <line x1="0" y1="16" x2="0" y2="28"/>
    </g>

    <!-- Small circuit dots on connections -->
    <circle cx="-12" cy="-8" r="2" fill="#a78bfa" opacity="0.9"/>
    <circle cx="12" cy="-8" r="2" fill="#22d3ee" opacity="0.9"/>
    <circle cx="-12" cy="8" r="2" fill="#22d3ee" opacity="0.9"/>
    <circle cx="12" cy="8" r="2" fill="#a78bfa" opacity="0.9"/>
  </g>

  <!-- Glow bar under icon -->
  <rect x="0" y="148" width="100" height="2" rx="1" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Main title -->
  <text x="100" y="72" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    Local<tspan fill="url(#accentGrad)">AI</tspan>
  </text>

  <!-- Subtitle -->
  <text x="101" y="100" font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
    Local LLM Stack for Developers
  </text>

  <!-- Divider line -->
  <line x1="100" y1="112" x2="440" y2="112" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.3"/>

  <!-- Tech badges row -->
  <g transform="translate(100, 128)" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#64748b">
    <!-- LiteLLM badge -->
    <rect x="0" y="0" width="60" height="18" rx="4" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="8" y="13" fill="#a78bfa">LiteLLM</text>

    <!-- Ollama badge -->
    <rect x="68" y="0" width="52" height="18" rx="4" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="76" y="13" fill="#22d3ee">Ollama</text>

    <!-- Docker badge -->
    <rect x="128" y="0" width="52" height="18" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="136" y="13" fill="#60a5fa">Docker</text>

    <!-- Continue badge -->
    <rect x="188" y="0" width="56" height="18" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="196" y="13" fill="#34d399">Continue</text>
  </g>
</svg>
